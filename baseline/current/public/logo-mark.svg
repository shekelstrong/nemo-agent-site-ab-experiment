<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Nemo Agent">
  <defs>
    <linearGradient id="g-ocean" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#051122"/>
    </linearGradient>
    <linearGradient id="g-cyan" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <radialGradient id="g-glow" cx="256" cy="256" r="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06B6D4" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#06B6D4" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="f-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- background disc (favicon-friendly dark) -->
  <rect width="512" height="512" rx="112" fill="url(#g-ocean)"/>
  <!-- soft glow -->
  <circle cx="256" cy="256" r="256" fill="url(#g-glow)"/>
  <!-- depth rings (subtle) -->
  <circle cx="256" cy="256" r="200" stroke="#06B6D4" stroke-opacity="0.08" stroke-width="1" fill="none"/>
  <circle cx="256" cy="256" r="160" stroke="#06B6D4" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <circle cx="256" cy="256" r="120" stroke="#06B6D4" stroke-opacity="0.18" stroke-width="1" fill="none"/>
  <!-- N monogram — two strokes forming submarine-periscope N -->
  <g stroke="url(#g-cyan)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- left vertical -->
    <line x1="148" y1="380" x2="148" y2="148"/>
    <!-- diagonal (periscope) -->
    <line x1="148" y1="148" x2="364" y2="380"/>
    <!-- right vertical (periscope) -->
    <line x1="364" y1="148" x2="364" y2="380"/>
  </g>
  <!-- periscope top (small cap on left stroke) -->
  <circle cx="148" cy="132" r="14" fill="#F59E0B"/>
  <!-- amber pulse dot (subtle accent) -->
  <circle cx="148" cy="132" r="6" fill="#FDFCF8"/>
  <!-- horizon wave under N (paper cream) -->
  <path d="M 100 420 Q 180 400 256 420 T 412 420" stroke="#FDFCF8" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M 100 440 Q 180 425 256 440 T 412 440" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
