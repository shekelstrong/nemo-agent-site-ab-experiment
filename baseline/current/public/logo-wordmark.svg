<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none" role="img" aria-label="Nemo Agent">
  <defs>
    <linearGradient id="wm-ocean" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#051122"/>
    </linearGradient>
    <linearGradient id="wm-cyan" x1="20" y1="20" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <!-- icon block -->
  <rect x="10" y="20" width="160" height="160" rx="36" fill="url(#wm-ocean)"/>
  <g stroke="url(#wm-cyan)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="46" y1="148" x2="46" y2="58"/>
    <line x1="46" y1="58" x2="114" y2="148"/>
    <line x1="114" y1="58" x2="114" y2="148"/>
  </g>
  <circle cx="46" cy="52" r="5" fill="#F59E0B"/>
  <!-- wordmark -->
  <text x="200" y="125" font-family="Fraunces, Georgia, serif" font-size="76" font-weight="600" fill="#FDFCF8" letter-spacing="-2">Nemo</text>
  <text x="200" y="160" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" font-weight="400" fill="#06B6D4" letter-spacing="3" text-transform="uppercase">AGENT</text>
</svg>
